services:
  db:
    image: postgres:16-alpine
    container_name: talentplatform_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: talent_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d talent_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: talentplatform_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: change-me-in-production
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost
      POSTGRES_DB: talent_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost,http://127.0.0.1
      EMAIL_NOTIFICATIONS_ENABLED: "true"
      SMTP_HOST: smtp.mail.ru
      SMTP_PORT: 465
      SMTP_USE_SSL: "true"
      SMTP_USE_TLS: "false"
      SMTP_USERNAME: projectsforprogramms@mail.ru
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      DEFAULT_FROM_EMAIL: projectsforprogramms@mail.ru
      FRONTEND_URL: http://localhost:5173
      PASSWORD_RESET_TIMEOUT_SECONDS: 1800
    volumes:
      - ./backend/media:/app/media
    ports:
      - "8000:8000"

  frontend:
    image: nginx:1.27-alpine
    container_name: talentplatform_frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "5173:80"

volumes:
  postgres_data:
